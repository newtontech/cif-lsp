# cif-lsp diagnostic rule manifest
#
# OpenQC / LSP rule export. Each entry describes a first-class diagnostic rule
# that cif-lsp can emit via `cif-lsp-tool check --format json`. The schema
# mirrors the rich-diagnostic fields surfaced by diagnostic engine v1.
#
# Source of truth for rule_id, severity, category, and fix hints is the
# TypeScript registry at server/src/rules/cifRules.ts. Keep this manifest in
# sync when adding rules.
schema: OpenQCDiagnosticsManifest
version: "1.0"
software: cif
diagnostic_engine: "1.0"
rules:
  - rule_id: cif.syntax.duplicate_tag
    severity: error
    category: syntax
    source: cif-lsp
    source_of_truth: IUCr CIF syntax guidance
    description: >-
      A data name (_tag) is declared more than once inside the same data block.
      CIF syntax requires each data name to appear at most once per block.
    message_template: "Duplicate data name '<tag>' in the same data block."
    fix_hints:
      - Rename or remove one of the duplicate _tag definitions in this data block.
      - If the values differ, choose the intended value and delete the redundant tag.
    manual_ref: https://www.iucr.org/resources/cif/spec/version1.1/cifsyntax
  - rule_id: cif.loop.unclosed_loop
    severity: error
    category: syntax
    source: cif-lsp
    source_of_truth: IUCr CIF syntax guidance
    description: >-
      A loop_ keyword is not followed by any data name. CIF syntax requires a
      loop_ header to declare at least one _tag before its value rows.
    message_template: "'<loop_>' is not followed by any data name."
    fix_hints:
      - Add at least one data name (_tag) on the line(s) following loop_.
      - Remove the stray loop_ keyword if no tabular data is intended.
    manual_ref: https://www.iucr.org/resources/cif/spec/version1.1/cifsyntax
  - rule_id: cif.loop.arity_mismatch
    severity: error
    category: syntax
    source: cif-lsp
    source_of_truth: IUCr CIF syntax guidance
    description: >-
      A loop_'s value rows do not match the number of declared data names. CIF
      syntax requires the total value count inside a loop to be an exact
      multiple of the number of _tag columns declared in its header.
    message_template: "'<loop_>' value rows do not match the number of declared data names."
    fix_hints:
      - Ensure every value row supplies exactly one value per declared _tag.
      - Add or remove values so the total value count is a multiple of the tag count.
    manual_ref: https://www.iucr.org/resources/cif/spec/version1.1/cifsyntax
  - rule_id: cif.value.invalid_uncertainty
    severity: warning
    category: type/value
    source: cif-lsp
    source_of_truth: IUCr CIF numeric value guidance
    description: >-
      A numeric value carries a malformed standard-uncertainty suffix. CIF
      allows a numeric value to be written as <number>(<digits>), where the
      parenthesised digits are the standard uncertainty in the last quoted
      digits. Suffixes such as (ab), (5.6), (), (5)(6), or trailing characters
      like 1.2(3)x are not valid uncertainty annotations.
    message_template: "Numeric value '<value>' has a malformed standard-uncertainty suffix."
    fix_hints:
      - Write the standard-uncertainty suffix as <number>(<digits>), e.g. 12.34(5).
      - Remove stray characters or extra parenthesised groups after the numeric value.
    manual_ref: https://www.iucr.org/resources/cif/spec/version1.1/cifsyntax
