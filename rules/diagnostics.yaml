# cif-lsp diagnostic rule manifest
#
# OpenQC / LSP rule export. Each entry describes a first-class diagnostic rule
# that cif-lsp can emit via `cif-lsp-tool check --format json`. The schema
# mirrors the rich-diagnostic fields surfaced by diagnostic engine v1.
#
# Source of truth for rule_id, severity, category, and fix hints is the
# TypeScript registry at server/src/rules/cifRules.ts. Keep this manifest in
# sync when adding rules.
schema: OpenQCDiagnosticsManifest
version: "1.0"
software: cif
diagnostic_engine: "1.0"
rules:
  - rule_id: cif.syntax.duplicate_tag
    severity: error
    category: syntax
    source: cif-lsp
    source_of_truth: IUCr CIF syntax guidance
    description: >-
      A data name (_tag) is declared more than once inside the same data block.
      CIF syntax requires each data name to appear at most once per block.
    message_template: "Duplicate data name '<tag>' in the same data block."
    fix_hints:
      - Rename or remove one of the duplicate _tag definitions in this data block.
      - If the values differ, choose the intended value and delete the redundant tag.
    manual_ref: https://www.iucr.org/resources/cif/spec/version1.1/cifsyntax
  - rule_id: cif.loop.unclosed_loop
    severity: error
    category: syntax
    source: cif-lsp
    source_of_truth: IUCr CIF syntax guidance
    description: >-
      A loop_ keyword is not followed by any data name. CIF syntax requires a
      loop_ header to declare at least one _tag before its value rows.
    message_template: "'<loop_>' is not followed by any data name."
    fix_hints:
      - Add at least one data name (_tag) on the line(s) following loop_.
      - Remove the stray loop_ keyword if no tabular data is intended.
    manual_ref: https://www.iucr.org/resources/cif/spec/version1.1/cifsyntax
  - rule_id: cif.loop.arity_mismatch
    severity: error
    category: syntax
    source: cif-lsp
    source_of_truth: IUCr CIF syntax guidance
    description: >-
      A loop_'s value rows do not match the number of declared data names. CIF
      syntax requires the total value count inside a loop to be an exact
      multiple of the number of _tag columns declared in its header.
    message_template: "'<loop_>' value rows do not match the number of declared data names."
    fix_hints:
      - Ensure every value row supplies exactly one value per declared _tag.
      - Add or remove values so the total value count is a multiple of the tag count.
    manual_ref: https://www.iucr.org/resources/cif/spec/version1.1/cifsyntax
  - rule_id: cif.value.invalid_uncertainty
    severity: warning
    category: type/value
    source: cif-lsp
    source_of_truth: IUCr CIF numeric value guidance
    description: >-
      A numeric value carries a malformed standard-uncertainty suffix. CIF
      allows a numeric value to be written as <number>(<digits>), where the
      parenthesised digits are the standard uncertainty in the last quoted
      digits. Suffixes such as (ab), (5.6), (), (5)(6), or trailing characters
      like 1.2(3)x are not valid uncertainty annotations.
    message_template: "Numeric value '<value>' has a malformed standard-uncertainty suffix."
    fix_hints:
      - Write the standard-uncertainty suffix as <number>(<digits>), e.g. 12.34(5).
      - Remove stray characters or extra parenthesised groups after the numeric value.
    manual_ref: https://www.iucr.org/resources/cif/spec/version1.1/cifsyntax
  - rule_id: cif.syntax.malformed_data_block
    severity: error
    category: syntax
    source: cif-lsp
    source_of_truth: IUCr CIF syntax guidance
    description: >-
      A `data_` keyword is written without a block name. CIF syntax requires
      every data block to start with `data_<block-name>` where `<block-name>`
      is non-empty. A standalone `data_` token is malformed because the block
      name is missing; downstream tools cannot anchor the block.
    message_template: "'<data_>' is missing its data-block name. CIF syntax requires data_<block-name> with a non-empty block name."
    fix_hints:
      - Provide a non-empty block name after data_, e.g. data_my_block.
      - Avoid whitespace between data_ and the block name; the name must immediately follow the keyword.
    manual_ref: https://www.iucr.org/resources/cif/spec/version1.1/cifsyntax
  - rule_id: cif.cell.missing_parameters
    severity: warning
    category: semantic consistency
    source: cif-lsp
    source_of_truth: CIF dictionary requirements
    description: >-
      A data block declares some but not all six canonical unit-cell
      parameters. Crystallographic runners require _cell.length_a/b/c and
      _cell.angle_alpha/beta/gamma to build a complete unit cell; a partial
      declaration leaves the cell under-specified.
    message_template: "Data block declares some but not all unit-cell parameters in data block '<block>'. Provide all six _cell_length_* and _cell_angle_* tags."
    fix_hints:
      - Declare all six unit-cell parameters: _cell_length_a/b/c and _cell_angle_alpha/beta/gamma.
      - If the cell is intentionally under-specified, document the missing parameters explicitly in a comment.
    manual_ref: https://www.iucr.org/resources/cif/dictionaries
  - rule_id: cif.atom_site.symmetry_mismatch
    severity: warning
    category: semantic consistency
    source: cif-lsp
    source_of_truth: CIF dictionary structural semantics
    description: >-
      Per-atom coordinates are declared without symmetry information. A block
      that lists `_atom_site_*` fractional or Cartesian coordinates but no
      `_symmetry_space_group_name_*`, `_symmetry_int_tables_number`, or
      `_symmetry_equiv_pos_as_xyz` cannot be interpreted unambiguously.
    message_template: "Atom-site coordinates ('<tag>') are declared without symmetry information; add _symmetry_space_group_name_H-M or _symmetry_equiv_pos_as_xyz."
    fix_hints:
      - Add a space-group header such as _symmetry_space_group_name_H-M 'P 1'.
      - Alternatively, list symmetry equivalent positions with a loop_ over _symmetry_equiv_pos_as_xyz.
    manual_ref: https://www.iucr.org/resources/cif/dictionaries
